<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanish Tamang - Contact</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div id="logo">
      <a href="index.html" class="logo-link">
        <img src="assets/images/logo.png" alt="Logo" class="logo">
      </a>
    </div>
    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <a href="about.html" class="cv-btn">My CV</a>
    <div id="menu">
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="contact" id="contact" style="padding-top: 120px; min-height: 80vh;">
      <h2>Get In Touch</h2>
      <div class="contact-container">
        <form class="contact-form" action="#" method="post">
          <div class="form-group">
            <input type="text" id="name" name="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Your Email" required>
          </div>
          <div class="form-group">
            <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
          </div>
          <button type="submit" class="btn">Send Message</button>
        </form>
        <div class="contact-info">
          <h3>Contact Information</h3>
          <p><i class="fas fa-envelope"></i> callmesanis@gmail.com</p>
          <p><i class="fas fa-phone"></i> +977 9749410499</p>
          <p><i class="fas fa-map-marker-alt"></i> Kalanki, Kathmandu, Nepal</p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-row">
      <div class="footer-social">
        <a href="https://www.linkedin.com/in/sanishtmg/" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://www.facebook.com/" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/" target="_blank"><i class="fab fa-instagram"></i></a>
      </div>
      <div class="footer-logo">
        <img src="assets/images/logo.png" alt="Logo" class="footer-logo-img">
      </div>
      <div class="footer-mail">
        <a href="mailto:callmesanis@gmail.com" class="footer-email">callmesanis@gmail.com</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2024 Sanish Tamang. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
